<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitMotiva</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- TELAS DE LOGIN/CADASTRO -->
<div id="loginScreen" class="center fade">
  <div class="card login">
    <h2>Entrar</h2>
    <input type="text" id="loginUser" placeholder="Usuário">
    <input type="password" id="loginPass" placeholder="Senha">
    <button onclick="login()">Entrar</button>
    <p class="link" onclick="showRegister()">Criar conta</p>
    <p id="loginMsg"></p>
  </div>
</div>

<div id="registerScreen" class="center fade" style="display:none">
  <div class="card login">
    <h2>Cadastrar</h2>
    <input type="text" id="registerUser" placeholder="Usuário">
    <input type="password" id="registerPass" placeholder="Senha">
    <button onclick="register()">Cadastrar</button>
    <p class="link" onclick="showLogin()">Já tenho conta</p>
    <p id="registerMsg"></p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
<header>

<!-- ⭐ PONTOS -->
<div class="pontos-box">
  ⭐ <span id="pontosTopo">0</span>
</div>

<!-- BEM-VINDO -->
<h1>🏋️ FitMotiva</h1>
<p id="welcomeUser"></p>

<!-- ⚙️ ENGRENAGEM -->
<div class="settings-icon" onclick="toggleSettings()">⚙️</div>
<div id="settingsMenu" class="settings-menu">
  <h4>Idioma 🌎</h4>
  <button onclick="setLanguage('pt')">Português</button>
  <button onclick="setLanguage('en')">English</button>
  <hr>
  <h4>Conta 👤</h4>
  <button onclick="trocarConta()">Trocar de conta</button>
  <button onclick="logout()">Sair</button>
</div>

</header>

<!-- BARRA DE NÍVEL / XP -->
<div class="nivel-box">
  Nível: <span id="nivel">1</span>
  <div class="xp-bar">
    <div class="xp-bar-fill" id="xpBar"></div>
  </div>
  <span id="xpText">0 / 50 XP</span>
</div>

<div class="container">
<div class="grid">

<!-- NOVA META -->
<div class="card">
<h2>Nova Meta</h2>
<input type="text" id="metaInput" placeholder="Ex: Fazer 20 flexões">
<input type="date" id="dateInput">
<button onclick="addMeta()">Adicionar</button>
<button class="secondary" onclick="testarNotificacao()">🔔 Testar</button>
</div>

<!-- PROGRESSO -->
<div class="card">
<h2>Progresso</h2>
<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>
<p id="progressText"></p>
</div>

<!-- METAS -->
<div class="card">
<h2>Metas</h2>
<ul id="metaList"></ul>
<p class="reward" id="rewardText"></p>
</div>

<!-- RECOMPENSAS -->
<div class="card">
<h2>Recompensas</h2>
<ul id="rewardList"></ul>
</div>

<!-- RANKING -->
<div class="card ranking-box">
<h2>🏆 Ranking</h2>
<ul id="rankingList"></ul>
</div>

</div>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
